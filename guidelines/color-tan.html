<!-- @dsCard group="Colors" viewport="700x150" name="Tan & Gold — highlights" subtitle="Accents on dark grounds + hairline rules" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg)}
.row{display:flex;height:150px}.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.sw span{font-size:11px;font-weight:600}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--gold);color:#3a2a10"><span>Gold</span><small>#C79A4A</small></div>
<div class="sw" style="background:var(--tan);color:#3a2a10"><span>Tan</span><small>#D4B896</small></div>
<div class="sw" style="background:var(--tan-soft);color:#3a2a10"><span>Tan Soft</span><small>#E6D3B5</small></div>
</div></body></html>
