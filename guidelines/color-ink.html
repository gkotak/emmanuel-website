<!-- @dsCard group="Colors" viewport="700x150" name="Ink & lines — text" subtitle="Text ink ramp + hairline" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper)}
.row{display:flex;height:150px}.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.sw span{font-size:11px;font-weight:600}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--ink);color:#fff"><span>Ink</span><small>#1A2238</small></div>
<div class="sw" style="background:var(--ink-soft);color:#fff"><span>Ink Soft</span><small>#4A4D5E</small></div>
<div class="sw" style="background:var(--muted);color:#fff"><span>Muted</span><small>#6B6358</small></div>
<div class="sw" style="background:var(--line);color:var(--ink)"><span>Line</span><small>#E3DCCC</small></div>
</div></body></html>
