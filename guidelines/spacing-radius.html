<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & shadow" subtitle="Square by default; elevation is rare" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--paper);padding:30px 32px;font-family:var(--font-sans);display:flex;gap:40px;align-items:center}
.s{display:flex;flex-direction:column;gap:10px;align-items:center;color:var(--muted);font-size:11px}
.box{width:90px;height:64px;background:#fff;border:1px solid var(--line)}</style></head>
<body>
<div class="s"><div class="box" style="border-radius:0"></div>None · 0 (default)</div>
<div class="s"><div class="box" style="border-radius:2px"></div>SM · 2px buttons</div>
<div class="s"><div class="box" style="border-radius:999px;width:64px"></div>Pill · tags/portraits</div>
<div class="s"><div class="box" style="border:none;box-shadow:var(--shadow-md)"></div>Shadow MD · hover</div>
</body></html>
