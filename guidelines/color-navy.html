<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg)}
.row{display:flex;height:150px}.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.sw span{font-size:11px;font-weight:600;letter-spacing:.02em}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--navy-deep);color:#fff"><span>Navy Deep</span><small>#0C2440</small></div>
<div class="sw" style="background:var(--navy);color:#fff"><span>Navy</span><small>#13315C</small></div>
<div class="sw" style="background:var(--navy-soft);color:#fff"><span>Navy Soft</span><small>#1C3F70</small></div>
</div></body></html>
