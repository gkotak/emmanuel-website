<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:0;font-family:var(--font-sans)}
.split{display:flex;height:220px}
.half{flex:1;display:flex;align-items:center;gap:16px;padding:0 32px}
.light{background:var(--paper)}.dark{background:var(--navy-deep)}
.light .name{font-family:var(--font-display);font-size:34px;font-weight:600;color:var(--navy)}
.light .sub{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--brown);font-weight:600;margin-top:3px}
.dark .name{font-family:var(--font-editorial);font-size:40px;font-weight:500;color:#fff}</style></head>
<body><div class="split">
<div class="half light"><img src="../assets/logo.png" width="58" alt="Emmanuel monogram"><div><div class="name">Emmanuel</div><div class="sub">Church · West Hampstead</div></div></div>
<div class="half dark"><img src="../assets/logo.png" width="58" style="filter:brightness(0) invert(1)" alt="Emmanuel monogram"><div class="name">Emmanuel</div></div>
</div></body></html>
