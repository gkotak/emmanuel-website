<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans)}
.row{display:flex;height:150px}.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:var(--ink)}
.sw span{font-size:11px;font-weight:600}.sw small{font-size:10px;opacity:.6;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--bg)"><span>BG</span><small>#FEFCF7</small></div>
<div class="sw" style="background:var(--paper)"><span>Paper</span><small>#FAF7F2</small></div>
<div class="sw" style="background:var(--cream)"><span>Cream</span><small>#F6F1EA</small></div>
<div class="sw" style="background:var(--paper-warm)"><span>Paper Warm</span><small>#F1EBDE</small></div>
<div class="sw" style="background:var(--paper-deep)"><span>Paper Deep</span><small>#EBE2CF</small></div>
</div></body></html>
