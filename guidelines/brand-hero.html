<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0}
.h{position:relative;height:240px;overflow:hidden}
.bg{position:absolute;inset:0;background:url('../assets/hero.jpg') center 50%/cover}
.sc{position:absolute;inset:0;background:var(--scrim-hero),var(--scrim-hero-side)}
.c{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 32px;color:#fff}
.eb{color:var(--tan);font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;margin-bottom:10px}
.t{font-family:var(--font-display);font-size:44px;font-weight:500;letter-spacing:-.015em;line-height:1}</style></head>
<body><div class="h"><div class="bg"></div><div class="sc"></div>
<div class="c"><div class="eb">Welcome to</div><div class="t">A church in the <em style="color:var(--tan)">heart</em> of West Hampstead</div></div>
</div></body></html>
